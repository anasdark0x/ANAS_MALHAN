plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.anastips'
    compileSdk 35

    defaultConfig {
        applicationId 'com.example.anastips'
        minSdk 23
        targetSdk 35
        versionCode 3
        versionName '3.0-real-ai-monster'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    aaptOptions {
        noCompress 'tflite'
    }
}

dependencies {
    implementation 'org.tensorflow:tensorflow-lite:2.16.1'
}
